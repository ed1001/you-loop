name: Deploy site

# Token-based deploy (no Vercel Git integration), so it always lands on the
# account that issued VERCEL_TOKEN regardless of the GitHub<->Vercel login.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull project settings (respects Root Directory = site)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Hobby plan blocks deploys on a private repo when it can't verify the
      # commit author. Strip the git context so Vercel treats this as a plain
      # token upload with no author to verify.
      - name: Strip git metadata
        run: rm -rf .git

      - name: Deploy
        env:
          GITHUB_ACTIONS: ''
          GITHUB_REPOSITORY: ''
          GITHUB_SHA: ''
          GITHUB_REF: ''
          GITHUB_ACTOR: ''
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
