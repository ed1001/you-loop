<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect x="6" y="6" width="116" height="116" rx="28" fill="#0a201d"/>

  <!-- Magnifier: rounded strokes -->
  <g fill="none" stroke="#2dd4bf" stroke-linecap="round" stroke-linejoin="round">
    <line x1="76" y1="76" x2="100" y2="100" stroke-width="10"/>
    <circle cx="54" cy="52" r="30" stroke-width="6.5"/>
  </g>

  <!-- Repeat glyph: two arrows bracketing a square, hard corners -->
  <g fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- top arrow: left vertical + top edge, arrowhead pointing right -->
    <path d="M 44 53 L 44 44 L 61 44"/>
    <path d="M 56 39 L 61 44 L 56 49"/>
    <!-- bottom arrow: right vertical + bottom edge, arrowhead pointing left -->
    <path d="M 64 51 L 64 60 L 47 60"/>
    <path d="M 52 55 L 47 60 L 52 65"/>
  </g>
</svg>
