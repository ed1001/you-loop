<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10312c"/>
      <stop offset="0.55" stop-color="#0a201d"/>
      <stop offset="1" stop-color="#050d0c"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>
  <rect x="6.5" y="6.5" width="115" height="115" rx="29.5" fill="none" stroke="#5eead4" stroke-opacity="0.18" stroke-width="1"/>
  <circle cx="64" cy="66" r="34" fill="url(#glow)"/>

  <!-- Loop ring, open at the top, with an arrowhead -->
  <path d="M 80.6 30.7 A 38 38 0 1 0 92 58"
        fill="none" stroke="url(#loop)" stroke-width="11" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M 70 22 L 86 27 L 79 42 Z" fill="#99f6e4" filter="url(#soft)"/>

  <!-- Play triangle -->
  <path d="M 53 47 L 53 85 L 86 66 Z" fill="#f8fafc" filter="url(#soft)"/>
</svg>
